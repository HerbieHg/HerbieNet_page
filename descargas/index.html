<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HerbieNet VPN - Descargas de Aplicaciones</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .app-logo {
            width: 40px !important;
            height: 40px !important;
            min-width: 40px !important;
            max-width: 40px !important;
            border-radius: 10px;
            object-fit: contain;
            display: block;
        }
        .downloads-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 40px;
        }
        .version-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .version-card:hover {
            border-color: var(--primary);
            background: rgba(0, 230, 118, 0.05);
            transform: scale(1.02);
        }
        .v-info h3 { margin-bottom: 5px; color: #fff; font-size: 1.4rem; }
        .v-info p { color: var(--text-dim); font-size: 0.9rem; }
        .v-badge {
            background: var(--primary);
            color: #000;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 0.75rem;
            margin-left: 10px;
            text-transform: uppercase;
        }
        .btn-v-download {
            background: #fff;
            color: #000;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .btn-v-download:hover { background: var(--primary); box-shadow: 0 0 20px var(--primary-glow); }
        
        @media (max-width: 600px) {
            .version-card { flex-direction: column; text-align: center; gap: 20px; }
            .v-info { margin-bottom: 10px; }
            .btn-v-download { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav class="glass-card">
        <div class="nav-content">
            <div class="logo">
                <img src="app_icon.png" alt="HerbieNet Logo" class="app-logo">
                <span>HerbieNet <span class="thin">VPN</span></span>
            </div>
            <a href="../" class="btn-primary">Volver a Inicio</a>
        </div>
    </nav>

    <main>
        <section class="hero-descargas">
            <div class="glass-card hero-content" style="padding: 60px 20px;">
                <h1>Centro de <br><span class="gradient-text">Descargas</span></h1>
                <p>Encuentra todas las versiones de HerbieNet VPN disponibles directamente desde nuestro repositorio oficial.</p>
                
                <div id="downloads-container" class="downloads-grid">
                    <p style="text-align: center; color: var(--text-dim);">Sincronizando con el servidor oficial...</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 HerbieNet Project. Hecho por HerbieHg</p>
    </footer>

    <script>
        lucide.createIcons();

        async function fetchAllReleases() {
            const container = document.getElementById('downloads-container');
            try {
                const response = await fetch('https://api.github.com/repos/HerbieHg/hg-assets-/releases');
                if (response.ok) {
                    const releases = await response.json();
                    container.innerHTML = ''; // Limpiar el cargando...

                    releases.forEach((release, index) => {
                        const version = release.tag_name;
                        const date = new Date(release.published_at).toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
                        
                        // 1. Buscamos el archivo APK específico subido a este Release
                        const apkAsset = release.assets.find(asset => asset.name.endsWith('.apk'));
                        
                        let downloadUrl = "";
                        let size = "42.3 MB";

                        if (apkAsset) {
                            // Si existe el archivo en el release, usamos su link de descarga directa
                            downloadUrl = apkAsset.browser_download_url;
                            size = (apkAsset.size / (1024 * 1024)).toFixed(1) + ' MB';
                        } else {
                            // Si no hay archivo en el release (versiones viejas), bajamos el archivo del repo
                            // pero lo apuntamos al link RAW para que sea descarga directa y no redirija
                            downloadUrl = `https://github.com/HerbieHg/hg-assets-/raw/main/herbienet.apk`;
                        }
                        
                        const badge = index === 0 ? '<span class="v-badge">Última</span>' : '';
                        const btnStyle = index === 0 ? '' : 'style="background: rgba(255,255,255,0.1); color: #fff;"';

                        const card = `
                            <div class="version-card">
                                <div class="v-info">
                                    <h3>Versión ${version} ${badge}</h3>
                                    <p>Lanzada: ${date} • Tamaño: ${size} • Oficial</p>
                                </div>
                                <a href="${downloadUrl}" class="btn-v-download" ${btnStyle}>
                                    <i data-lucide="download"></i>
                                    Descargar APK
                                </a>
                            </div>
                        `;
                        container.innerHTML += card;
                    });
                    lucide.createIcons(); // Recargar iconos para las nuevas tarjetas
                } else {
                    container.innerHTML = '<p>Error al sincronizar las versiones. Inténtalo de nuevo más tarde.</p>';
                }
            } catch (error) {
                console.error('Error cargando versiones:', error);
                container.innerHTML = '<p>Error de conexión. Revisa tu acceso a internet.</p>';
            }
        }
        fetchAllReleases();
    </script>
</body>
</html>
